<!DOCTYPE html>
<html>
<head>
<title>Assignment Cover Generator</title>
<link rel="stylesheet" href="style.css">

<!-- PDF library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<h2>Assignment Cover Page Generator Created by Mahdi Islam Chowdhury (CSE-60)</h2>

<div class="form-box">


<input type="text" id="assignmentNo" placeholder="Assignment No">
<input type="text" id="assignmentTitle" placeholder="Assignment Title">
<input type="text" id="courseTitle" placeholder="Course Title">
<input type="text" id="courseCode" placeholder="Course Code">

<input type="text" id="teacherName" placeholder="Teacher Name">
<input type="text" id="designation" placeholder="Designation">

<input type="text" id="studentName" placeholder="Student Name">
<input type="text" id="studentId" placeholder="Student ID">
<input type="text" id="batch" placeholder="Batch">
<input type="text" id="section" placeholder="Section">
<input type="text" id="date" placeholder="Date">


<button onclick="generateCover()">Generate Cover</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<hr>

<div id="coverPage" class="cover">

<img src="smu_logo.png" class="logo">



<div id="content"></div>

</div>


</body>
</html>
